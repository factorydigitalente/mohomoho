/* スムージング（補間）を防止し、くっきりと */
#mohomoho { border: solid .2em #fff; image-rendering: pixelated; }
#queue { border: solid .2em #fff; image-rendering: pixelated; }
#preview { border: solid .2em #fff; image-rendering: pixelated; }
/* UIヘッダーのスタイル */
#ui-header {
    font-size: 14px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; width:540px; margin-bottom:10px; background:#333; padding:10px; border-radius:5px; box-sizing:border-box;
    display: flex; flex-direction: column;
}
.header-top {
    display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; margin-bottom: 5px;
}
.header-title {
    grid-column: 2; text-align: center; font-size: 1.3em; margin-bottom:-20px;
}
.btn-back {
    cursor: pointer; width: 40px; grid-column: 3; justify-self: end; margin-bottom:-20px;
}
#overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.2); z-index:1000; flex-direction:column; justify-content:center; align-items:center; color:white; pointer-events:none; }
.message-box { background:rgba(0,0,0,0.1); padding:25px; border-radius:20px; pointer-events:auto; border: 1px solid rgba(255,255,255,0.2); }
#overlay-title { font-size:3rem; margin-bottom:10px; background:rgba(0,0,0,0.3); padding:10px 20px; border-radius:10px; }
#overlay-msg { font-size:1.5rem; background:rgba(0,0,0,0.3); padding:5px 15px; border-radius:10px; }
#toast { display:none; position:absolute; top:20%; left:50%; transform:translateX(-50%); padding:20px; background:rgba(200,0,0,0.2); backdrop-filter:blur(3px); color:white; font-size:2rem; border-radius:10px; z-index:500; }
#game-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    touch-action:none; //スマホ対策でブラウザ操作禁止
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
}
.flex-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.bar-container { position:relative; width:100%; height:10px; background:#111; border-radius:5px; overflow:hidden; margin-bottom:5px; }
.bar { position:absolute; height:100%; transition:width 0.3s; }
.stat-box { display:flex; justify-content:space-between; font-size:12px; color:#aaa; }
.canvas-container { display:flex; justify-content:center; align-items:flex-start; gap:10px; }
.side-canvases { display:flex; flex-direction:column; gap:10px; }
.btn-container { margin-top:20px; margin-bottom:20px; }
#touch-controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    position:relative;
    z-index:100;
    pointer-events:auto;
    touch-action:none; //スマホ対策でブラウザ操作禁止
}
#action-btns { display:flex; gap: 20px; margin-left: 120px; margin-top: -30px;}
.btn-group { display:flex; flex-direction:column; align-items:center; gap:5px; }
.btn-label { font-size:16px; font-weight:bold; color:#fff; text-shadow:1px 1px 2px #000; pointer-events:none; }
#d-pad { position:relative; width:150px; height:150px; background:transparent; }
.d-btn { position:absolute; width:55px; height:55px; background:#777; border-radius:10px; }

#btn-up { top:5px; left:45px; clip-path:polygon(50% 100%, -30% -10%, 130% -10%); }
#btn-down { bottom:30px; left:45px; clip-path:polygon(50% -0%, -30% 110%, 130% 110%); }
#btn-left { top:35px; left:15px; clip-path:polygon(100% 50%, -10% -30%, -10% 130%); }
#btn-right { top:35px; right:20px; clip-path:polygon(0% 50%, 110% -30%, 110% 130%); }

.a-b-btn {
    width:90px;
    height:90px;
    border-radius:50%;

    /* ★外枠（輪郭） */
    border:3px solid rgba(255,255,255,0.65);

    background:linear-gradient(#e00000,#900000);
    color:white;
    font-weight:bold;
    font-size:2.2rem;

    box-shadow:
        0 5px 0 rgba(0,0,0,0.8),
        inset 0 2px 0 rgba(255,255,255,0.2);

    transition:transform 0.1s, filter 0.1s;
}
.a-b-btn:active {
    transform:translateY(3px) scale(0.92);
    filter:brightness(0.8);

    box-shadow:
        0 2px 0 rgba(0,0,0,0.9),
        inset 0 3px 6px rgba(0,0,0,0.5);
}
.d-btn {
    position:absolute;
    width:55px;
    height:55px;
    background:linear-gradient(#8a8a8a,#5a5a5a);
    border-radius:10px;

    /* ★輪郭追加 */
    border:2px solid rgba(255,255,255,0.55);
    box-shadow:
        0 3px 0 rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.2);

    transition:transform 0.1s, filter 0.1s;
}
.d-btn:active {
    transform:translateY(2px) scale(0.95);
    filter:brightness(0.85);

    /* 押し込み感強化 */
    box-shadow:
        0 1px 0 rgba(0,0,0,0.9),
        inset 0 2px 4px rgba(0,0,0,0.4);
}
canvas { border:solid .2em #fff; }
#mohomoho { width: 400px; height: auto; }
#preview { width: 128px; height: auto; }
#queue { width: 128px; height: auto; border-radius: 8px; }
/* スマホ調整 */
@media screen and (max-width: 1000px) {
  #game-wrapper {
    transform: scale(1.7);

    left: 50%;

  }
}

    left:0;

.stage-row > div:first-child { font-weight:bold; width: 50px; }
.mode-btn { font-weight:bold; padding:2px 8px; font-size:10px; cursor:pointer; flex: 0 0 80px; text-align:center; }

.stage-thumb { width:64px; height:80px; border:1px solid #fff; }
.mode-btns { display:flex; flex-direction:column; gap:4px; }
.mode-row { display:flex; align-items:center; gap:8px; font-size:12px; width: 100%; flex-wrap: nowrap; white-space: nowrap; }
.mode-row span { font-weight: 800; }
.check { color:#0f0; }

.info-row {
  display: flex;
  align-items: center;
  /* キャンディカラーの緑 */
  background: #B9F6CA; 
  padding: 10px 15px;
  border-radius: 20px; /* 角をより丸くしてポップに */
  gap: 15px;
  font-size: 14px;
  /* 文字色を背景に合う濃いグリーンに */
  color: #2E7D32;
  font-weight: 900;
  /* 斜体は解除 */
  font-style: normal;
  /* ポップな雰囲気を出すためのフォント指定 */

}
/* 背景スクロール用 */
@keyframes bg-scroll {
    from { background-position: 0 0; }
    to { background-position: 512px 512px; }
}
/* スマホ横持ち禁止 */
#rotate-warning{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    color:#fff;
    font-size:20px;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

@media (max-width:768px) and (orientation: landscape){
    #rotate-warning{
        display:flex;
    }

#guide-layer, #title-modal {

.guide-text {

.switch {

//落下中のブロックを「一つの塊」として角丸で切り抜いて描画するためのヘルパー関数
function drawRoundedBlock(ctx,x,y,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+2-r,y); ctx.quadraticCurveTo(x+2,y,x+2,y+r);
    ctx.lineTo(x+2,y+2-r); ctx.quadraticCurveTo(x+2,y+2,x+2-r,y+2);
    ctx.lineTo(x+r,y+2); ctx.quadraticCurveTo(x,y+2,x,y+2-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

// 最初に待機列を埋める関数を定義
function fillQueue(){
    while(pieceList.length>0){
        const index=Math.floor(Math.random()*pieceList.length);
        const piece = pieceList.splice(index,1)[0];
        // ランダムに0〜3回回転させる
        const rotations = Math.floor(Math.random() * 4);
        for(let i=0; i<rotations; i++){
            playerRotateMatrix(piece.matrix);
        }
        piece.id = getPieceId(piece.matrix);
        queueList.push(piece);
    }
}

// ゲーム開始時に待機列を生成し、操作する最初のピースを配置する
fillQueue();

/**
 * ブロックの形状（行列データ）を文字列化して一意なIDを作成する
 * @param {Array} matrix - 2x2のブロック行列
 * @returns {string} カンマ区切りのID
 */
function getPieceId(matrix) {
    const id = matrix.map(row => row.join(',')).join(',');
    // 灰色(0)のブロックが期待通りか確認するため、IDに0が含まれる場合のみログ出力
    //if (id.includes('0')) {
    //    console.log("生成されたID:", id);
    //}
    return id;
}

/**
 * 待機列の先頭から次のピースを取り出し、ゲーム用のオブジェクトを生成する
 * @returns {Object|null} ピースの行列・ID・状態を含むオブジェクト
 */
function spawnPiece(){
    fillQueue();
    const piece=queueList.shift();
    if(!piece)return null;
    piece.isSkipped=false;
    return piece;
}

/**
 * ステージデータから2x2のブロックオブジェクトを生成する
 * @param {Array} data - ステージ全体の行列データ
 * @param {number} x - ブロックの左上隅のX座標
 * @param {number} y - ブロックの左上隅のY座標
 * @returns {Object} 生成されたブロックオブジェクト
 */
function createPiece(data = [[0]], x = 0, y = 0) {
    // ステージデータから2x2の範囲を切り出して行列を作成
    const m = [
        [data[y][x], data[y][x + 1]],
        [data[y + 1][x], data[y + 1][x + 1]]
    ];
    return {
	    matrix: m,
	    id: getPieceId(m),        // 現在の向き
	    targetId: getPieceId(m),  // 完成図の向き（変更しない）
	    targetPos: {x,y},
	    isSkipped:false
	};
}

/**
 * ステージデータから全Pieceを生成する
 * @param {Object} stageData
 * @returns {Array}
 */
function generatePiecesFromStage(stageData){
    const pieces=[];
    const data=stageData.data;
    for(let y=0;y<stageData.height;y+=2){
        for(let x=0;x<stageData.width;x+=2){
            const piece=createPiece(data,x,y);
            piece.targetPos={
                x:x,
                y:y
            };
            piece.skipped=false;
            piece.placed=false;
            pieces.push(piece);
        }
    }
    return pieces;
}

/**
 * Piece一覧から在庫マップを生成する
 */
function buildInventory(pieceList){
    const inventory={};
    pieceList.forEach(piece=>{
        inventory[piece.id]=(inventory[piece.id]||0)+1;
    });
    return inventory;
}

/**
 * 指定されたサイズの行列を作成し、初期値（背景色）として-1で埋める
 * @param {number} w - 幅
 * @param {number} h - 高さ
 * @returns {Array} 初期化された行列データ
 */
function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(-1));
    return matrix;
}

/**
 * 完成予想図（プレビュー）をCanvasに描画する
 * @param {Object} stageData - 描画するステージのデータ
 */
function drawPreview(stageData) {
    // 1セルあたりのピクセルサイズを算出
	const cellSize = Math.min(pCanvas.width / stageData.width, pCanvas.height / stageData.height);
    pCtx.fillStyle = '#000';
    pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);
    
    // 座標系のリセットとスケーリング
    pCtx.setTransform(1, 0, 0, 1, 0, 0);
    pCtx.scale(cellSize, cellSize);
    // 描画位置を下寄せにオフセット
    pCtx.translate((pCanvas.width / cellSize - stageData.width) / 2, pCanvas.height / cellSize - stageData.height);
    
	// カラーパレット設定（0:灰, 1:赤, 2:緑, 3:青, 4:黄, 5:白）
    // const colors = ['gray', 'red', 'green', 'blue', 'yellow', 'white'];
    //const colors = ['#999999', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ffffff'];
    // 緑と青の判別をしやすく調整したキャンディカラー
    const colors = ['#a0a0a0', '#ff6b81', '#7ed957', '#3a86ff', '#ffe066', '#ffffff'];
	stageData.data.forEach((row, y) => {
		row.forEach((value, x) => {
            pCtx.fillStyle = colors[value];
            // 1.1 にすることで隣接ピクセルを覆い、隙間による線を目立たなくする
            pCtx.fillRect(x, y, 1.1, 1.1);
        });
    });
    // Mirrorモード時は左右反転レイヤーを重ねる
    if(currentGameMode === GAME_MODE.MIRROR){
        pCtx.setTransform(1, 0, 0, 1, 0, 0);
        pCtx.save();
        pCtx.scale(-1, 1);
        pCtx.drawImage(pCanvas, -pCanvas.width, 0);
        
        // 鏡の反射演出（斜めの光を流す）
        pCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        pCtx.lineWidth = 6;
        pCtx.beginPath();
        for(let i = -2; i < 2; i += 0.8){
            const x = i * pCanvas.width + (mirrorOffset % (0.8 * pCanvas.width));
            pCtx.moveTo(x, 0);
            pCtx.lineTo(x + pCanvas.width, pCanvas.height);
        }
        pCtx.stroke();
        
        pCtx.restore();
    }
}

// ゲームキャンバス用背景画像オブジェクトをグローバルに定義
const bgImage = new Image();
bgImage.src = './img/game_bg.jpg';

// ステージ選択画面のランダムモードサムネイル画像をグローバルでロードしておく

/**
 * ゲーム画面、プレビュー、待機列のすべての描画を行うメインループ関数
 */
function draw() {
    // 1. 背景画像の描画（塗りつぶしの代わりに配置）

	// スケールをリセットして背景を描画
    context.save();
    context.setTransform(1, 0, 0, 1, 0, 0); // 16倍スケールを一旦解除
    context.imageSmoothingEnabled = true;
    context.imageSmoothingQuality = 'high';
    // キャンバスの物理サイズ（192x320）に合わせる
    context.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
	// 背景を暗くする（半透明の黒を重ねる）
    context.fillStyle = 'rgba(0, 0, 0, 0.1)'; // 0.4の数値を調整で暗さを変更可
    context.fillRect(0, 0, canvas.width, canvas.height);
    // スケールを元に戻す
    context.restore();

    // 2. グリッドの描画（2x2ブロック単位を強調）
	// 縦線（偶数番目のみ引く）
	for (let i = 0; i <= 12; i++) {
	    if (i % 2 === 0) {
	        context.lineWidth = 0.10;
	        context.strokeStyle = '#974b00'; // オレンジ系
	        context.beginPath(); 
	        context.moveTo(i, 0); 
	        context.lineTo(i, 20); 
	        context.stroke();
	    }
	}
	// 横線（偶数番目のみ引く）
	for (let i = 0; i <= 20; i++) {
	    if (i % 2 === 0) {
	        context.lineWidth = 0.10;
	        context.strokeStyle = '#974b00'; // オレンジ系
	        context.beginPath(); 
	        context.moveTo(0, i); 
	        context.lineTo(12, i); 
	        context.stroke();
	    }
	}
    // 完成ライン（上部余白とゲームエリアの境界） (y=4)
    context.lineWidth = 0.2;
    context.strokeStyle = '#0af';
    context.beginPath(); context.moveTo(0, 4); context.lineTo(12, 4); context.stroke();

    // 3. 設置済みブロックと操作中ブロックの描画
    drawMatrix(arena, {x: 0, y: 0}, context, false);
    
    // 設置直後のピースを一瞬だけ白く光らせる
	if(placeFlash){
	    context.save();
	    context.globalAlpha=placeFlash.life/10;
	    context.fillStyle="#fff";
	    context.fillRect(placeFlash.x,placeFlash.y,2,2);
	    context.restore();

	    placeFlash.life--;
	    if(placeFlash.life<=0)placeFlash=null;
	}

    if (player.matrix) {
        // 回転で設定された scaleEffect を適用し、なければ1.0
        const scale = (player.scaleEffect && player.scaleEffect > 1.0) ? player.scaleEffect : 1.0;
        
        // 描画後に拡大率を減衰させる
        if (player.scaleEffect && player.scaleEffect > 1.0) {
            player.scaleEffect -= 0.05;
            if (player.scaleEffect <= 1.0) player.scaleEffect = null;
        }
        
        // 拡大描画
        drawMatrix(player.matrix, player.pos, context, true, 0, scale);
    }

    // 残像エフェクト描画
    if(dropEffect){
        context.fillStyle = 'white';
        const alpha = dropEffect.life / 6;
        context.globalAlpha = alpha * 0.5; // 軌跡自体は少し控えめに
        context.fillRect(dropEffect.x, dropEffect.y, 2, dropEffect.h);
        
        // 流れ星のような粒を描画（粒子サイズを小さくし、密度を少し上げる）
        context.globalAlpha = alpha;
        for(let i=0; i<8; i++){
            const py = dropEffect.y + Math.random() * dropEffect.h + (20 - dropEffect.life) * 0.1;
            // 粒子サイズを 0.4 → 0.25 に変更
            context.fillRect(dropEffect.x + (Math.random()-0.5)*0.8, py, 0.25, 0.25);
        }
        context.globalAlpha = 1.0;
        dropEffect.life--;
        if(dropEffect.life <= 0) dropEffect = null;
    }

    // 4. 完成予想図と待機列の描画
    // 反射線の移動速度
    if(currentGameMode === GAME_MODE.MIRROR){
        mirrorOffset += 0.3 + Math.sin(Date.now() / 1000) * 0.2;
    }
    drawPreview(currentStage);

    qCtx.fillStyle = '#000';
    qCtx.fillRect(0, 0, qCanvas.width, qCanvas.height);
    for (let i = 0; i < queueList.length; i++) {
        const piece=queueList[i];
		const m=piece.matrix;
        //1列当たりのブロック表示数
        const col = Math.floor(i / 16);
        const row = i % 16;

        qCtx.save();
        if(i===0){
            // 先頭のピースは大きく描画
            qCtx.scale(0.9, 0.9);
            // 待機列内のピース位置を計算（倍率0.75で補正）
            // 先頭は丸みを0.8に設定
            drawMatrix(piece,{x:(0.75+col*1.8)/0.75,y:(0.3+row*1.5)/0.75},qCtx, false, 0.8);
        }else{
            // ブロックをより小さく設定
            qCtx.scale(0.6, 0.6);
            // 待機列内のピース位置を計算し、枠の左上に寄せつつ、間隔xとyを調整し、倍率0.6に合わせて補正
            // 丸みを0.8に設定
            drawMatrix(piece,{x:(1.4+col*2.6)/0.7,y:(0.7+row*1.8)/0.6},qCtx, false, 0.8);
        }
        qCtx.restore();
    }
}

//待機列
/**
 * ブロック行列を指定されたCanvasコンテキストの座標に描画する
 * @param {Object|Array} pieceData - ブロックデータ（または行列）
 * @param {Object} offset - 描画開始位置 {x, y}
 * @param {CanvasRenderingContext2D} ctx - 描画先のコンテキスト
 */
function drawMatrix(pieceData, offset, ctx = context, isFalling = false, roundRadius = 0, scale = 1.0) {
    const matrix = pieceData.matrix || pieceData;
    // const colors = ['gray', 'red', 'green', 'blue', 'yellow', 'white'];
    //const colors = ['#999999', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ffffff'];
    // 緑と青の判別をしやすく調整したキャンディカラー
    const colors = ['#a0a0a0', '#ff6b81', '#7ed957', '#3a86ff', '#ffe066', '#ffffff'];

	ctx.save();
    // 拡大時は2x2ブロックの中心（offset + 1）を軸にスケーリング
    if (scale !== 1.0) {
        ctx.translate(offset.x + 1, offset.y + 1);
        ctx.scale(scale, scale);
        ctx.translate(-(offset.x + 1), -(offset.y + 1));
    }

    // roundRadiusが0より大きい場合のみ角丸を適用
    if(isFalling || roundRadius > 0){
        // roundRadius処理時は既にsaveされているため、ここでのsaveは削除
        //r: 丸みの半径（0.0〜1.0の間で指定。大きいほど丸みが強くなる）
        drawRoundedBlock(ctx, offset.x, offset.y, isFalling ? 0.8 : roundRadius);
        ctx.clip();
    }
    matrix.forEach((row, y) => {
		row.forEach((value, x) => {
			// 数値が-1（何もない＝背景）以外の場合のみ描画。
            if (value !== -1) {
                ctx.fillStyle=colors[value];
                ctx.fillRect(x+offset.x,y+offset.y,1.1,1.1); // 待機列ブロックの内部線を消すために敢えて1.1倍にする
                
                // ブロック境界を少し暗くして立体感を出す
                //const edgeAlpha=(value===5)?0.18:0.12;
                //ctx.fillStyle=`rgba(0,0,0,${edgeAlpha})`;
                //ctx.fillRect(x+offset.x+0.92,y+offset.y,0.08,1);
                //ctx.fillRect(x+offset.x,y+offset.y+0.92,1,0.08);

                // 落下中ブロックのみ左上から右下へ光沢グラデーション
                //if(isFalling){
                //    const g=ctx.createLinearGradient(
                //        x+offset.x,
                //        y+offset.y,
                //        x+offset.x+1,
                //        y+offset.y+1
                //    );
                //    g.addColorStop(0,"rgba(255,255,255,0.45)");
                //    g.addColorStop(0.35,"rgba(255,255,255,0.18)");
                //    g.addColorStop(1,"rgba(255,255,255,0)");
                //    ctx.fillStyle=g;
                //    ctx.fillRect(x+offset.x,y+offset.y,1,1);
                //}
            }
        });
    });
    ctx.restore();
    // スキップされたピースに▼マークを付与
    if (pieceData.isSkipped) {
        ctx.fillStyle = 'white';
        ctx.font = '1px Arial';
        ctx.fillText('▼', offset.x + 2.2, offset.y + 1);
    }
}

/**
 * プレイヤーの操作ピースを一段下へ移動させる
 * 衝突時は設置判定を行い、次のピースを生成する
 */
function playerDrop() {
    player.pos.y++;
    // 衝突判定：移動先が壁や既存ブロックに重なる場合
    if (collide(arena, player)) {
    	draw(); // 設置直前の状態を反映
        player.pos.y--;
        // 設置直前のピース情報を一時変数に保存（判定用）
        const currentPiece = player.matrix;
        // 正解判定
        const isCorrect=checkPiecePlacement(currentPiece,player.pos);
        if(isCorrect){
		    merge(arena,player);
		    audio.playSE('./se/se_correct.mp3');
		    placeFlash={
			    x:player.pos.x,
			    y:player.pos.y,
			    life:5
			};
		    lastX = player.pos.x;
		    currentPiece.placed=true;
		    currentPiece.isSkipped=false;
		    gameStat.score++;
		    updateUI();
		}else{
		    gameStat.ng++;
		    audio.playSE('./se/se_ng.mp3');
		    showWarning("NG Piece");
		    updateUI();
		    lastX = player.pos.x; // NG時も設置X座標を記録
		    if(currentGameMode === GAME_MODE.FIX){
		        currentPiece.id = currentPiece.targetId;
		        currentPiece.isSkipped = false;
		        queueList.push(currentPiece);
		        player.matrix = null; // 盤面に固定せず消失させる
		    }else{
		        merge(arena, player);
		        placeFlash={
				    x:player.pos.x,
				    y:player.pos.y,
				    life:5
				};
		    }
		}
        // 5. クリア判定
        const total = (currentStage.width * currentStage.height) / 4;
        const isClear =
            (currentGameMode === GAME_MODE.FIX && gameStat.score >= total) ||
            ((currentGameMode === GAME_MODE.SIMILAR || currentGameMode === GAME_MODE.MIRROR) &&
             (gameStat.score + gameStat.ng) >= total);

        // クリア済みなら次のピースを生成せず終了
        if(isClear){
            requestAnimationFrame(() => {
                draw();
                checkGameEnd();
            });
            dropCounter = 0;
            return;
        }

        // 6. 次のピース生成と出現位置の初期化
        player.pos.y = 0;
        player.pos.x = lastX;
        player.matrix = spawnPiece();

        // 描画が更新される次のタイミングで判定するために少し遅延させる
        requestAnimationFrame(() => {
            draw();
            checkGameEnd();
        });

		// 7. 新しいピースが即座に衝突する場合はゲームオーバー
        if (collide(arena, player)) {
            dropEffect = null;
            gameOver = true;
            if(animationId) cancelAnimationFrame(animationId);
            animationId = null;
            draw();
            showResultOverlay("GAME OVER!", -1);
        }
    }
    // 落下カウンターをリセット
    dropCounter = 0;
}

/**
 * ピースと盤面の衝突判定を行う
 * @param {Array} arena - 盤面のデータ
 * @param {Object} player - プレイヤーの操作データ
 * @returns {boolean} 衝突している場合はtrue
 */
function collide(arena, player) {
    if(!player || !player.matrix) return true;
    const [m, o] = [player.matrix.matrix || player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
        	//「-1（背景色＝無色）」以外で衝突判定
        	// 盤面の範囲外、または既にブロックが存在する場所であれば衝突
			if (arena[y + o.y] && arena[y + o.y][x + o.x] !== -1) return true;
            if (x + o.x < 0 || x + o.x >= 12 || y + o.y >= 20) return true;
        }
    }
    return false;
}

/**
 * ピースが正しい位置・向きにあるか判定する
 * @param {Object} piece
 * @param {Object} pos
 * @returns {boolean}
 */
function checkPiecePlacement(piece,pos){
    if(!piece)return false;
    // 設置した場所のステージデータを取得し、ピースの色配置と比較
    // 特定の座標を見るのではなく、その座標がステージデータ上の「本来の色（正解）」と一致しているか確認し、柔軟性を持たせる
    for(let y=0; y<2; y++){
        for(let x=0; x<2; x++){
            const targetColor = currentStage.data[pos.y + y - 4] ? currentStage.data[pos.y + y - 4][pos.x + x] : -1;
            if(piece.matrix[y][x] !== targetColor) return false;
        }
    }
    return true;
}

/**
 * Chance Lost判定
 * @param {Object} piece
 * @param {Object} pos
 * @returns {boolean}
 */
function checkChanceLost(piece,pos){
    if(!piece.isSkipped)return false;
    // 設置した場所が、そのピースの本来の色と一致していれば「チャンスロス」
    // 座標ではなく「その場所が本来持っている色」を基に判定
    return checkPiecePlacement(piece,pos);
}

// チャンスロスト判定用
function canPlaceCorrectlyNow(piece){
    const backup={
        matrix:piece.matrix.map(r=>r.slice()),
        id:piece.id
    };
    for(let rot=0;rot<4;rot++){
        if(checkPiecePlacement(piece,{x:piece.targetPos.x,y:piece.targetPos.y+4})){
            const testPlayer={
                matrix:piece,
                pos:{
                    x:piece.targetPos.x,
                    y:0
                }
            };
            while(!collide(arena,testPlayer)){
                testPlayer.pos.y++;
            }
            testPlayer.pos.y--;
            if(
                testPlayer.pos.x===piece.targetPos.x &&
                testPlayer.pos.y===piece.targetPos.y+4
            ){
                piece.matrix=backup.matrix;
                piece.id=backup.id;
                return true;
            }
        }
        playerRotateMatrix(piece.matrix);
        piece.id=getPieceId(piece.matrix);
    }
    piece.matrix=backup.matrix;
    piece.id=backup.id;
    return false;
}

/**
 * 衝突したピースを盤面に固定する
 * @param {Array} arena - 盤面のデータ
 * @param {Object} player - プレイヤーの操作データ
 */
function merge(arena, player) {
    const m = player.matrix.matrix || player.matrix;
    m.forEach((row, y) => {
		row.forEach((value, x) => {
            // ブロックが有効な値（-1以外）であれば盤面に反映
            if (value >= 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
    // 設置完了後、操作中のピースを解放
    player.matrix = null;
}

/**
 * 操作中のピースを回転させる
 * @param {number} dir - 回転方向（正なら右、負なら左）
 */
function playerRotate(dir) {
    const m = player.matrix.matrix || player.matrix;
    // 転置行列の作成により回転を実行
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
    }
    // 回転方向に応じて反転
    if (dir > 0) m.forEach(row => row.reverse()); else m.reverse();

    // 回転後に衝突する場合は元に戻す
    // 回転した際に形状（色の配置）が変わるため、IDを再生成して同期させます。
    if (collide(arena, player)) {
        if (dir > 0) m.forEach(row => row.reverse()); else m.reverse();
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        }
    }
    // 形状変化に合わせてピースIDを更新
    player.matrix.id = getPieceId(m);
    delete player.scaleEffect;
    player.scaleEffect = 1.2; // 拡大率を設定
}

// チャンスロスト判定用の回転シミュレーション
function playerRotateMatrix(m){
    for(let y=0;y<m.length;y++){
        for(let x=0;x<y;x++){
            [m[x][y],m[y][x]]=[m[y][x],m[x][y]];
        }
    }
    m.forEach(row=>row.reverse());
}

/**
 * ピースを底まで一気に落下させ、設置処理を実行する
 */
let dropEffect = null;
// 設置時のフラッシュ演出
let placeFlash=null;
function playerHardDrop() {
    const startY = player.pos.y;
    while (!collide(arena, player)) player.pos.y++;
    player.pos.y--;
    // 寿命を20フレーム（約0.3秒）に設定
    dropEffect = { x: player.pos.x, y: startY, h: player.pos.y - startY + 2, life: 20 };
    playerDrop();
}

// 落下間隔を制御するカウンタ
let dropCounter = 0;
// 前回の更新時間を記録
let lastTime = 0;
// update()多重起動防止
let animationId = null;
// 鏡の反射演出用オフセット
let mirrorOffset = 0;

/**
 * ゲームのメインループ関数
 * 経過時間を計算し、一定間隔でピースを落下させ描画を更新する
 * @param {number} time - requestAnimationFrameから渡される現在のタイムスタンプ
 */
function update(time = 0) {
    if (gameOver) return;
    if (typeof currentStage === 'undefined') return;
    // デルタ時間を計算して累積カウンタを更新
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    // 落下間隔を超えたらピースを落下
    if (dropCounter > DROP_INTERVAL) playerDrop();
    // 画面を再描画
    draw();
    // 次のフレームを予約
    animationId = requestAnimationFrame(update);
}

/**
 * キーボードイベントリスナー
 * 左右移動、落下、回転、スキップ等のプレイヤー操作を処理する
 */
document.addEventListener('keydown', event => {
    if(gameOver && event.key === 'a') {
	    document.getElementById('overlay').style.display = 'none';
	    audio.playBGM('./bgm/bgm_select.mp3');
	    openStageSelect();
	    return;
	}
    if(gameOver) return;
    // 左移動：奇数座標を回避するため移動量は「2」
    if (event.key === 'ArrowLeft') {
        player.pos.x -= 2;
        if (collide(arena, player)) player.pos.x += 2;
    } 
    // 右移動：奇数座標を回避するため移動量は「2」
    else if (event.key === 'ArrowRight') {
        player.pos.x += 2;
        if (collide(arena, player)) player.pos.x -= 2;
    } 
    // 下落下
    else if (event.key === 'ArrowDown') playerDrop();
    // ハードドロップ（即時設置）
    else if (event.key === 'ArrowUp') {
        if (!event.repeat) playerHardDrop();
    }
    // Aキー：回転（ゲームオーバー時はリセット）
    else if (event.key === 'a') {
        if (gameOver) resetGame();
        else playerRotate(-1);
    } 
    // Bキー：現在のピースを待機列の最後尾へ送ってスキップ
    else if (event.key === 'b') handleSkip();
});

function handleSkip(){
    if(canPlaceCorrectlyNow(player.matrix)){
        gameStat.chanceLost++;
        audio.playSE('./se/se_lost.mp3');
        showWarning("Chance Lost!");
    }else{
        audio.playSE('./se/se_skip.mp3');
    }
    player.matrix.isSkipped = true;
    queueList.push(player.matrix);
    lastX = player.pos.x;
    player.matrix = spawnPiece();
    gameStat.skipCount = (gameStat.skipCount || 0) + 1;
    updateUI();
}

// ゲームオーバー状態を管理するフラグ
let gameOver = false;

// プレイ開始時刻（performance.now()）
let gameStartTime = 0;

/**
 * 統計情報を計算し、HTML要素を更新する
 */
function updateUI() {
    const total = (currentStage.width * currentStage.height) / 4;
    const isFix = (currentGameMode === GAME_MODE.FIX);
    const correctWidth = Math.min((gameStat.score / total) * 100, 100);
    const ngWidth = isFix ? 0 : Math.min((gameStat.ng / total) * 100, 100 - correctWidth);
    
    const modeName = (currentGameMode === GAME_MODE.FIX) ? "FIX" : (currentGameMode === GAME_MODE.MIRROR ? "Mirror" : "Similar");
    document.getElementById('stat-mode').innerText = `${modeName}: ${Math.floor(correctWidth)}%`;
    document.getElementById('stat-skip').innerText = gameStat.skipCount || 0;
    document.getElementById('stat-ng').innerText = gameStat.ng;
    document.getElementById('stat-cl').innerText = gameStat.chanceLost;
    
    document.getElementById('bar-correct').style.width = correctWidth + '%';
    document.getElementById('bar-ng').style.width = ngWidth + '%';
}

/**
 * ゲームの状態を初期化し、再開する
 */
function resetGame() {
	dropEffect = null;
	placeFlash = null; // 追加：フラッシュエフェクトもリセット
    document.getElementById('overlay').style.display = 'none';
    // 盤面をリセット（現在のモードは変更せず維持）（行ごとにfill(-1)を明示）
    arena.forEach(row => { for(let i=0; i<row.length; i++) row[i] = -1; });
    // Piece一覧と待機列の再生成
	pieceList=generatePiecesFromStage(currentStage);
	pieceInventory=buildInventory(pieceList);
	queueList=[];
	fillQueue();
    // プレイヤー位置と操作ピースの初期化
    document.getElementById('current-stage-title').innerText = currentStage.title || ""; //ステージタイトル
    player.pos.y = 0;
    player.pos.x = lastX;
    player.matrix = spawnPiece();
    delete player.scaleEffect;
	//統計の初期化
	gameStat.score=0;
	gameStat.ng=0;
	gameStat.chanceLost=0;
	gameStat.skipCount=0;
	gameStat.time=0;

	// プレイ開始
	gameStartTime=performance.now();

	updateUI();
    // フラグとループの再設定
    gameOver = false;
    lastTime = performance.now(); // 現在時刻から開始
    
    // アニメーションIDをクリアし、強制的にupdateを呼び出してループを開始
    if(animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(update);
}

// 結果画面オーバーレイ表示
// FIXモード
//   NGなし（perfect）: FIX Perfect!
//   NGあり（clear）  : FIX Clear!
// SIMILAR / MIRRORモード
//   100%（perfect）  : {Mode} Perfect!
//   100%未満（clear）: {Mode} Clear!
function showResultOverlay(mode, percentage, ngCount = 0){
    const overlay = document.getElementById('overlay');
    audio.playBGM(percentage >= 0 ? './bgm/bgm_clear.mp3' : './bgm/bgm_gameover.mp3', false);
    const title = document.getElementById('overlay-title');
    // percentageが-1なら（ゲームオーバーなら）モード名のみ表示
    let msg = mode;
    if (mode === 'FIX') {
        msg = (ngCount === 0) ? "FIX Perfect!" : "FIX Clear!";
    } else if (percentage === 100) {
        msg = `${mode} Perfect!`;
    } else if (percentage >= 0) {
        msg = `${mode} Clear!`;
    }
    title.innerText = msg;
    overlay.style.display = 'flex';
}

// 警告トースト表示
function showWarning(text){
    const toast = document.getElementById('toast');
    toast.innerText = text;
    toast.style.display = 'block';
    setTimeout(()=>{ toast.style.display = 'none'; }, 1500);
}

// ゲーム終了判定
function checkGameEnd(){
    const total = (currentStage.width * currentStage.height) / 4;
    if(currentGameMode === GAME_MODE.FIX && gameStat.score >= total){
	    dropEffect = null;
	    gameOver = true;

	    // プレイ時間を確定
	    gameStat.time = Math.floor((performance.now() - gameStartTime) / 1000);

		draw();
	    updateStageRecord();
	    if(animationId){ cancelAnimationFrame(animationId); animationId = null; }
	    setTimeout(() => showResultOverlay("FIX", 100, gameStat.ng), 100);
	}else if((currentGameMode === GAME_MODE.MIRROR && (gameStat.score + gameStat.ng) >= total) || (currentGameMode === GAME_MODE.SIMILAR && (gameStat.score + gameStat.ng) >= total)){
	    gameOver = true;
	    gameStat.time = Math.floor((performance.now() - gameStartTime) / 1000);
	    draw();
	    updateStageRecord();
	    if(animationId){ cancelAnimationFrame(animationId); animationId = null; }
	    
	    const modeTitle = (currentGameMode === GAME_MODE.MIRROR) ? "Mirror" : "Similar";
        setTimeout(() => {
            const percent = Math.floor((gameStat.score / total) * 100);
            showResultOverlay(modeTitle, percent === 100 ? 100 : percent, gameStat.ng);
        }, 100);
    }
}

function handleTouch(btn) {
	if(gameOver && btn === 'a'){
	    document.getElementById('overlay').style.display='none';
	    audio.playBGM('./bgm/bgm_select.mp3');
	    openStageSelect();
	    return;
	}
    else if (btn === 'a') playerRotate(-1);
    else if (btn === 'b') handleSkip();
}

//モード切り替え

/**
 * ランダムにステージを選択してゲームを開始する
 * @param {string} mode - 'FIX', 'SIMILAR', 'MIRROR' のいずれか
 */
function selectRandomStage(mode) {
    document.getElementById('stage-select-overlay').style.display = 'none';
    const randomIndex = Math.floor(Math.random() * stages.length);
    isRandomStage = true;
    currentStageIndex = randomIndex;
    currentStage = stages[randomIndex];
    currentGameMode = GAME_MODE[mode];
    audio.playSE('./se/effect_go.mp3');
    const bgmMap = { FIX: './bgm/bgm_stage_fix.mp3', SIMILAR: './bgm/bgm_stage_similar.mp3', MIRROR: './bgm/bgm_stage_mirror.mp3' };
    audio.playBGM(bgmMap[mode]);
    resetGame();
}

/**
 * ステージデータを自動生成する（UI側とゲーム開始側で共通利用）
 */
function generateStageData(level) {
    const w = 12, h = 16;
    //自動生成の難易度（色数、隣接セルと同じ色になる確率）
    const config = {
        1: { colors: 3, prob: 1 },
        2: { colors: 4, prob: 0.8 },
        3: { colors: 5, prob: 0.8 }
    };
    const { colors: colorCount, prob } = config[level] || config[3];
    const data = [];

    for (let y = 0; y < h; y++) {
        const row = [];
        for (let x = 0; x < w; x++) {
            const left = (x > 0) ? row[x - 1] : null;
            const top = (y > 0) ? data[y - 1][x] : null;
            const neighbor = Math.random() < 0.5 ? left : top;
            
            if (neighbor !== null && Math.random() < prob) {
                row.push(neighbor);
            } else {
                row.push(Math.floor(Math.random() * colorCount));
            }
        }
        data.push(row);
    }
    return { width: w, height: h, data: data };
}

/**
 * 自動生成ステージを実行する
 * @param {string} mode - 'FIX', 'SIMILAR', 'MIRROR'
 * @param {number} level - 1 (Easy), 2 (Normal), 3 (Hard)
 */
function selectGenerateStage(mode,level=3){
	isRandomStage = false;
    let stageData;
    if(level===1) stageData=generatedStageEasy;
    else if(level===2) stageData=generatedStageNormal;
    else stageData=generatedStageHard;

    currentStage=JSON.parse(JSON.stringify(stageData));
    currentGameMode=GAME_MODE[mode];
    document.getElementById('stage-select-overlay').style.display='none';
    audio.playSE('./se/effect_go.mp3');
    const bgmMap = { FIX: './bgm/bgm_stage_fix.mp3', SIMILAR: './bgm/bgm_stage_similar.mp3', MIRROR: './bgm/bgm_stage_mirror.mp3' };
    audio.playBGM(bgmMap[mode]);
    resetGame();
}

let pressInterval = null;
function startPress(key) {
    document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
    if (key !== 'ArrowUp') {
        pressInterval = setInterval(() => {
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        }, 150);
    }
}
function stopPress() {
    clearInterval(pressInterval);
    pressInterval = null;

/**
 * 自動生成済みのデータを受け取ってサムネイル描画する
 */
function drawGenerateThumb(canvasId, stageData) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const colors = ['#a0a0a0', '#ff6b81', '#7ed957', '#3a86ff', '#ffe066', '#ffffff'];
    
    const w = stageData.width;
    const h = stageData.height;
    const cw = canvas.width / w;
    const ch = canvas.height / h;
    
    stageData.data.forEach((row, y) => {
        row.forEach((val, x) => {
            ctx.fillStyle = colors[val] || '#000';
            // 1.15 にすることで隣接ピクセルを覆い、隙間による線を目立たなくする
            ctx.fillRect(x * cw, y * ch, cw * 1.15, ch * 1.15);
        });
    });
}

    generatedStageHard=generateStageData(3);

    drawGenerateThumb('thumb-easy',generatedStageEasy);
    drawGenerateThumb('thumb-normal',generatedStageNormal);

});

}

// ========================================
// BitWriter
// ========================================
class BitWriter{
    constructor(){
        this.bits=[];
    }
    writeBits(value,length){
        for(let i=length-1;i>=0;i--){
            this.bits.push((value>>i)&1);
        }
    }
    toUint8Array(){
        const bytes=new Uint8Array(Math.ceil(this.bits.length/8));
        for(let i=0;i<this.bits.length;i++){
            if(this.bits[i]){
                bytes[i>>3]|=(1<<(7-(i&7)));
            }
        }
        return bytes;
    }
}

// ========================================
// BitReader
// ========================================
class BitReader{
    constructor(bytes){
        this.bytes=bytes;
        this.position=0;
    }
    readBits(length){
        let value=0;
        for(let i=0;i<length;i++){
            const byte=this.bytes[this.position>>3];
            const bit=(byte>>(7-(this.position&7)))&1;
            value=(value<<1)|bit;
            this.position++;
        }
        return value;
    }
}

// ========================================
// Base64URL Encoder / Decoder
// ========================================
function uint8ArrayToBase64URL(bytes){
    let binary="";
    bytes.forEach(b=>binary+=String.fromCharCode(b));

    return btoa(binary)
        .replace(/\+/g,"-")
        .replace(/\//g,"_")
        .replace(/=+$/,"");
}
function base64URLToUint8Array(text){
    let base64=text
        .replace(/-/g,"+")
        .replace(/_/g,"/");
    while(base64.length%4){
        base64+="=";
    }
    const binary=atob(base64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++){
        bytes[i]=binary.charCodeAt(i);
    }
    return bytes;
}

// ========================================
// SaveData Version Header
// ========================================
function encodeSaveBytes(bytes){
    return SAVE_VERSION+uint8ArrayToBase64URL(bytes);
}

function decodeSaveBytes(text){
    if(!text||text.length<2)return null;
    const version=text.charAt(0);
    if(version!==SAVE_VERSION){
        console.warn("Unknown Save Version:",version);
        return null;
    }
    return base64URLToUint8Array(text.substring(1));
}

// ========================================
// SaveData → BitStream
// ========================================
function saveDataToBytes(){
    const writer=new BitWriter();
    saveData.stages.forEach(stage=>{
        // FIX
        writer.writeBits(stage.fix.played?1:0,1);
        writer.writeBits(stage.fix.time,12);
        writer.writeBits(stage.fix.skip,10);
        writer.writeBits(stage.fix.ng,7);
        // SIMILAR
        writer.writeBits(stage.similar.played?1:0,1);
        writer.writeBits(stage.similar.rate,7);
        writer.writeBits(stage.similar.time,12);
        writer.writeBits(stage.similar.skip,10);
        writer.writeBits(stage.similar.ng,7);
        // MIRROR
        writer.writeBits(stage.mirror.played?1:0,1);
        writer.writeBits(stage.mirror.rate,7);
        writer.writeBits(stage.mirror.time,12);
        writer.writeBits(stage.mirror.skip,10);
        writer.writeBits(stage.mirror.ng,7);
    });
    return writer.toUint8Array();
}

// ========================================
// BitStream → SaveData
// ========================================
function loadSaveDataFromBytes(bytes){
    const reader=new BitReader(bytes);
    saveData.stages=[];
    for(let i=0;i<stages.length;i++){
        saveData.stages.push({
            fix:{
                played:!!reader.readBits(1),
                time:reader.readBits(12),
                skip:reader.readBits(10),
                ng:reader.readBits(7)
            },
            similar:{
                played:!!reader.readBits(1),
                rate:reader.readBits(7),
                time:reader.readBits(12),
                skip:reader.readBits(10),
                ng:reader.readBits(7)
            },
            mirror:{
                played:!!reader.readBits(1),
                rate:reader.readBits(7),
                time:reader.readBits(12),
                skip:reader.readBits(10),
                ng:reader.readBits(7)
            }
        });
    }
}

// ========================================
// SaveData Serialize
// ========================================
function exportSaveData(){
    return encodeSaveBytes(saveDataToBytes());
}

function importSaveData(text){
    const bytes=decodeSaveBytes(text);
    if(!bytes){
        return false;
    }
    loadSaveDataFromBytes(bytes);
    return true;
}

// ========================================
// Record Update
// ========================================
function getCurrentRecord(){
    const time=Math.min(gameStat.time||0,3599);
    const skip=Math.min(gameStat.skipCount||0,999);
    const ng=Math.min(gameStat.ng||0,99);
    if(currentGameMode===GAME_MODE.FIX){
        return{
            played:true,
            time,
            skip,
            ng
        };
    }
    const total=(currentStage.width*currentStage.height)/4;
    const rate=Math.min(100,Math.floor((gameStat.score/total)*100));
    return{
        played:true,
        rate,
        time,
        skip,
        ng
    };
}

function isBetterFix(oldRec,newRec){
    if(!oldRec.played)return true;
    if(newRec.time!==oldRec.time)return newRec.time<oldRec.time;
    if(newRec.skip!==oldRec.skip)return newRec.skip<oldRec.skip;
    return newRec.ng<oldRec.ng;
}

function isBetterScore(oldRec,newRec){
    if(!oldRec.played)return true;
    if(newRec.rate!==oldRec.rate)return newRec.rate>oldRec.rate;
    if(newRec.time!==oldRec.time)return newRec.time<oldRec.time;
    if(newRec.skip!==oldRec.skip)return newRec.skip<oldRec.skip;
    return newRec.ng<oldRec.ng;
}


function updateStageRecord(){
	//自動生成ステージは保存しない
	if(typeof currentStageIndex==="undefined"){
	    return false;
	}
    // ランダムステージは保存しない
    if(isRandomStage){
        return false;
    }

    // currentStageIndex未定義（自動生成等）は保存しない
    if(typeof currentStageIndex==="undefined"){
        return false;
    }

    // 自動生成ステージは保存しない
    if(currentStage!==stages[currentStageIndex]){
        return false;
    }
    const record=getCurrentRecord();
    const stage=saveData.stages[currentStageIndex];
    let updated=false;
    if(currentGameMode===GAME_MODE.FIX){
        if(isBetterFix(stage.fix,record)){
            stage.fix=record;
            updated=true;
        }
    }else if(currentGameMode===GAME_MODE.SIMILAR){
        if(isBetterScore(stage.similar,record)){
            stage.similar=record;
            updated=true;
        }
    }else if(currentGameMode===GAME_MODE.MIRROR){
        if(isBetterScore(stage.mirror,record)){
            stage.mirror=record;
            updated=true;
        }
    }
    //URL移行済みなら初回クリア時にURLをきれいにする
    if(updated){
	    saveToURL();

	    if(migratedFromURL){
	        const url=new URL(location.href);
	        url.searchParams.delete("save");
	        history.replaceState(null,"",url);
	        migratedFromURL=false;
	    }
	}
    return updated;
}

// ========================================
// LocalStorage Save：URL保存関数をLocalStorage保存へ変更
// ========================================
function saveToURL(){
    localStorage.setItem("mohomohoSave",exportSaveData());
}

// ========================================
// LocalStorage / URL Load：LocalStorage優先、無ければURLから読み込む、URLから読み込んだら移行フラグを立てる
// ========================================
let migratedFromURL=false;
function loadFromURL(){
    const local=localStorage.getItem("mohomohoSave");
    if(local){
        return importSaveData(local);
    }
    const params=new URLSearchParams(location.search);
    const save=params.get("save");
    if(!save){
        return false;
    }
    const ok=importSaveData(save);
    if(ok){
        localStorage.setItem("mohomohoSave",save);
        migratedFromURL=true;
    }
    return ok;
}

// URLからSaveData復元（この位置での記述が重要）
loadFromURL();

/**
 * 秒数を mm:ss 形式へ変換
 */
function formatTime(seconds){
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

/**
 * Perfect判定（🏆トロフィー記号表示用）
 * FIXモード：　NGが0件でクリアしていれば🏆。 Similarモード：　100%でクリアしていれば🏆。 Mirrorモード：　100%でクリアしていれば🏆。
 */
function isPerfectClear(mode, record){
    if(!record.played) return false;
    if(mode === GAME_MODE.FIX){
        return record.ng === 0;
    }
    return record.rate === 100;
}

/**
 * ステージ選択画面へ保存記録を反映する
 */
function updateStageSelectRecords(){
    saveData.stages.forEach((stage,index)=>{
        const row=document.getElementById(`row-${index}`);
        //console.log("index", index);
		//console.log("row", row);
        if(!row)return;
        const rows = row.querySelectorAll(".mode-row");
		//console.log("rows.length", rows.length);
		//console.log(rows);
		const list = [
		    stage.fix,
		    stage.similar,
		    stage.mirror
		];

		list.forEach((record, i) => {
		    const spans = rows[i].querySelectorAll("span");
			const check = spans[0];
			const text = spans[1];
			
			let star = "";

			if (i === 0) {
			    if (record.played && record.ng === 0) star = "🏆";
			} else {
			    if (record.played && record.rate === 100) star = "🏆";
			}

			check.textContent = star;

		    if (!record.played) {
		        text.textContent = "--";
		        return;
		    }

		    if (i === 0) {
		        text.textContent =
		            `${formatTime(record.time)} / Skip ${record.skip} / NG ${record.ng}`;
		    } else {
		        text.textContent =
		            `${record.rate}% / ${formatTime(record.time)} / Skip ${record.skip} / NG ${record.ng}`;
		    }
		});
    });
}

//音源管理用クラス
class AudioManager {
    constructor() {
        this.bgm = null;
        this.se = {};
        this.bgmMuted = false;
        this.seMuted = false;
    }
    playBGM(src, loop = true) {
        if (this.bgm) {
            if (this.bgm.src.endsWith(src)) {
                if (this.bgmMuted) this.bgm.pause(); else this.bgm.play().catch(() => {});
                return;
            }
            this.bgm.pause();
        }
        this.bgm = new Audio(src);
        this.bgm.loop = loop;
        this.bgm.volume = 0.5;
        if (!this.bgmMuted) this.bgm.play().catch(() => {});
    }
    stopBGM() { if (this.bgm) { this.bgm.pause(); this.bgm = null; } }
    playSE(src) {
        if (this.seMuted) return;
        const audio = new Audio(src);
        audio.volume = 0.7;
        audio.play().catch(() => {});
    }
}
const audio = new AudioManager();
function toggleMusic() {
    audio.bgmMuted = !audio.bgmMuted;
    const btn = document.getElementById('music-toggle');
    btn.classList.toggle('active', !audio.bgmMuted);
    btn.innerText = audio.bgmMuted ? '♪BGM OFF' : '♪BGM ON';
    if (audio.bgm) { if (audio.bgmMuted) audio.bgm.pause(); else audio.bgm.play().catch(() => {}); }
}
function toggleAlert() {
    audio.seMuted = !audio.seMuted;
    const btn = document.getElementById('alert-toggle');

}
