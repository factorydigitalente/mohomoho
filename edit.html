<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dot Editor 12x16</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f0f0; }
        .controls { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(12, 30px); gap: 1px; background: #999; border: 2px solid #333; cursor: crosshair; touch-action: none; user-select: none; }
        .cell { width: 30px; height: 30px; background: #888; }
        .palette { margin: 20px 0; display: flex; gap: 10px; }
        .color-btn { width: 40px; height: 40px; border: 3px solid transparent; cursor: pointer; }
        .color-btn.active { border-color: #000; }
        #clear-btn { padding: 10px 20px; cursor: pointer; background: #ffcccc; border: 1px solid #999; }
        textarea { width: 400px; height: 350px; font-family: monospace; padding: 10px; resize: none; }
    </style>
</head>
<body>

    <h2>Dot Editor (12x16)</h2>
    <div class="controls">
        <div class="palette" id="palette"></div>
        <button id="clear-btn">全てクリア</button>
    </div>
    <div class="grid" id="grid"></div>
    <p>※クリックまたはドラッグで描画</p>
    <div style="display:flex; gap:10px;">
        <div>JSON形式<br><textarea id="output" onclick="this.select()"></textarea></div>
        <div>192桁形式<br><textarea id="flat-output" onclick="this.select()"></textarea></div>
    </div>

    <script>
        const COLS = 12, ROWS = 16;
        const colors = ['#888', '#f00', '#0f0', '#00f', '#ff0', '#fff'];
        let activeColor = 0;
        let gridData = Array(ROWS).fill().map(() => Array(COLS).fill(0));

        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');

        // パレット生成
        const paletteEl = document.getElementById('palette');
        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'color-btn' + (i === 0 ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => {
                activeColor = i;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                div.classList.add('active');
            };
            paletteEl.appendChild(div);
        });

        // グリッド生成
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r; cell.dataset.c = c;

				gridEl.appendChild(cell);
            }
        }
        const paintAtCoord = (clientX, clientY) => {
            const el = document.elementFromPoint(clientX, clientY);
            if(el && el.classList.contains('cell')){
                const r = parseInt(el.dataset.r), c = parseInt(el.dataset.c);
                paint(r, c);
            }
        };
        gridEl.addEventListener('mousedown', (e) => {
            paintAtCoord(e.clientX, e.clientY);
            const move = (ev) => paintAtCoord(ev.clientX, ev.clientY);
            const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        });
        gridEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            paintAtCoord(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        gridEl.addEventListener('touchmove', (e) => {
            e.preventDefault();
            paintAtCoord(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // クリアボタン機能
        document.getElementById('clear-btn').onclick = () => {
            gridData = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            Array.from(gridEl.children).forEach(cell => cell.style.backgroundColor = colors[0]);
            updateJSON();
        };

        function paint(r, c) {
            gridData[r][c] = activeColor;
            gridEl.children[r * COLS + c].style.backgroundColor = colors[activeColor];
            updateJSON();
        }

        const flatOutputEl = document.getElementById('flat-output');
        function updateJSON() {
            outputEl.value = "[\n" + gridData.map(row => "    [" + row.join(',') + "]").join(",\n") + "\n]";
            flatOutputEl.value = gridData.map(row => row.join('')).join('');
        }
        outputEl.oninput = () => {
            try {
                const d = JSON.parse(outputEl.value);
                if(d.length === ROWS && d[0].length === COLS){
                    gridData = d;
                    renderGrid();
                }
            } catch(e) {}
        };
        flatOutputEl.oninput = () => {
            const v = flatOutputEl.value.replace(/[^0-5]/g, '');
            if(v.length === 192){
                for(let i=0; i<192; i++) gridData[Math.floor(i/COLS)][i%COLS] = parseInt(v[i]);
                renderGrid();
            }
        };
        function renderGrid() {
            Array.from(gridEl.children).forEach((cell, i) => cell.style.backgroundColor = colors[gridData[Math.floor(i/COLS)][i%COLS]]);
            outputEl.value = "[\n" + gridData.map(row => "    [" + row.join(',') + "]").join(",\n") + "\n]";
            flatOutputEl.value = gridData.map(row => row.join('')).join('');
        }
        updateJSON();
		// テキストからグリッドを反映させる処理
        outputEl.readOnly = false; // 編集可能に変更
        outputEl.oninput = () => {
            try {
                const newData = JSON.parse(outputEl.value);
                if (Array.isArray(newData) && newData.length === ROWS && newData[0].length === COLS) {
                    gridData = newData;
                    Array.from(gridEl.children).forEach((cell, i) => {
                        const r = Math.floor(i / COLS), c = i % COLS;
                        cell.style.backgroundColor = colors[gridData[r][c] || 0];
                    });
                }
            } catch(e) {}
        };
    </script>
</body>
</html>
